<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Administrasi NU Baleharjo</title>
<meta name="robots" content="noindex, nofollow">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; overflow: hidden; background: #0f3d24; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; }

  #app-frame {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
    display: block;
  }

  #loader {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #0f3d24;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: #fff;
    z-index: 10;
    transition: opacity 0.3s ease;
  }
  #loader.hide { opacity: 0; pointer-events: none; }

  .spinner {
    width: 42px; height: 42px;
    border: 4px solid rgba(255,255,255,0.25);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #loader p { font-size: 14px; opacity: 0.85; }

  #fallback {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #0f3d24;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    color: #fff;
    text-align: center;
    padding: 24px;
    z-index: 11;
  }
  #fallback.show { display: flex; }
  #fallback h2 { font-size: 18px; font-weight: 600; }
  #fallback p { font-size: 13.5px; opacity: 0.85; max-width: 360px; line-height: 1.5; }
  #fallback a {
    display: inline-block;
    margin-top: 6px;
    padding: 10px 22px;
    background: #fff;
    color: #0f3d24;
    font-weight: 600;
    font-size: 14px;
    text-decoration: none;
    border-radius: 8px;
  }
</style>
</head>
<body>

  <div id="loader">
    <div class="spinner"></div>
    <p>Memuat Sistem Administrasi NU Baleharjo...</p>
  </div>

  <div id="fallback">
    <h2>Halaman tidak bisa dimuat di sini</h2>
    <p>Buka langsung link resminya di tab baru untuk mengakses sistem.</p>
    <a id="fallback-link" href="#" target="_blank" rel="noopener">Buka Sistem Administrasi</a>
  </div>

  <iframe id="app-frame" title="Sistem Administrasi NU Baleharjo" allow="clipboard-write"></iframe>

<script>
  // ============================================================
  // GANTI URL DI BAWAH INI kalau URL web app GAS berubah.
  // Ambil dari: Apps Script Editor > Deploy > Manage deployments
  // (URL yang diakhiri /exec)
  // ============================================================
  var GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwSK9pZh5H18yFqpsTmY29GqoUIeE1HcRUzuVKt8o8OVflyflLz8AT6jaWZ2bHWp-bUFQ/exec";

  var frame = document.getElementById('app-frame');
  var loader = document.getElementById('loader');
  var fallback = document.getElementById('fallback');
  var fallbackLink = document.getElementById('fallback-link');

  fallbackLink.href = GAS_WEB_APP_URL;
  frame.src = GAS_WEB_APP_URL;

  var loaded = false;

  frame.addEventListener('load', function () {
    loaded = true;
    loader.classList.add('hide');
    setTimeout(function () { loader.style.display = 'none'; }, 350);
  });

  // Kalau dalam 8 detik iframe belum juga load (misal diblokir), tampilkan fallback
  setTimeout(function () {
    if (!loaded) {
      loader.style.display = 'none';
      fallback.classList.add('show');
    }
  }, 8000);
</script>

</body>
</html>
